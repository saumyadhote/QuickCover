<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>QuickCover — Worker App</title>
    <meta name="description" content="AI-powered parametric income protection for India's gig delivery workers." />

    <!-- Prevent FOUC -->
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        background: #020617;
      }

      /* ── Desktop: render app inside a phone frame ── */
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      /* Phone bezel wrapper — only visible on screens wider than 480px */
      .phone-frame {
        position: relative;
        width: 393px;
        height: 852px;
        border-radius: 50px;
        background: #0f172a;
        box-shadow:
          inset 0 0 0 2px #334155,
          0 0 0 8px #1e293b,
          0 0 0 10px #0f172a,
          0 0 0 11px #334155,
          0 60px 120px rgba(0, 0, 0, 0.8),
          0 20px 40px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        flex-shrink: 0;
      }

      /* Dynamic island notch */
      .phone-frame::before {
        content: '';
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 34px;
        background: #0f172a;
        border-radius: 20px;
        z-index: 9999;
        pointer-events: none;
      }

      /* Status bar spacer so app content isn't behind the notch */
      .phone-frame::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50px;
        background: transparent;
        z-index: 9998;
        pointer-events: none;
      }

      /* Volume buttons (decorative) */
      .phone-side-btn {
        position: absolute;
        width: 4px;
        border-radius: 2px;
        background: #334155;
      }
      .vol-up   { top: 140px; left: -12px; height: 36px; }
      .vol-down { top: 188px; left: -12px; height: 36px; }
      .power    { top: 180px; right: -12px; height: 56px; }

      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        /* Clip the app to the phone frame */
        border-radius: 50px;
      }

      /* Page background label */
      .page-label {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        color: #334155;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.08em;
        white-space: nowrap;
        pointer-events: none;
        user-select: none;
      }

      /* ── Mobile: full-screen, no frame ── */
      @media (max-width: 480px) {
        body {
          background: #ffffff;
          display: block;
        }
        .phone-frame {
          width: 100vw;
          height: 100vh;
          border-radius: 0;
          box-shadow: none;
          background: transparent;
        }
        .phone-frame::before,
        .phone-frame::after,
        .phone-side-btn,
        .page-label {
          display: none;
        }
        #root {
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="phone-frame">
      <div class="phone-side-btn vol-up"></div>
      <div class="phone-side-btn vol-down"></div>
      <div class="phone-side-btn power"></div>
      <div id="root"></div>
    </div>
    <span class="page-label">QuickCover &nbsp;·&nbsp; Worker App &nbsp;·&nbsp; Demo</span>
  </body>
</html>
